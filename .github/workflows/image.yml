name: image

# Build the multi-arch engine image and push it to Docker Hub.
#   - push to the `dev` branch -> lebovskiis/aegis:dev          (testing build)
#   - push a `vX.Y.Z` tag      -> lebovskiis/aegis:X.Y.Z, :X.Y, :latest  (prod release)
# Multi-arch (amd64 + arm64) with SBOM + build provenance for audit.
#
# Requires one repo secret: DOCKERHUB_TOKEN (a Docker Hub access token with Read/Write).

on:
  push:
    branches: [dev]
    tags: ["v*"]

env:
  IMAGE: lebovskiis/aegis

permissions:
  contents: read
  id-token: write        # provenance attestation

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: lebovskiis
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image metadata / tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true          # software bill of materials (audit)
          provenance: true    # build provenance attestation
