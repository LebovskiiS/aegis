name: tests

# Unit + integration tests. Run on the thin core (no engine deps needed), so it's fast.

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (thin core + pytest)
        run: pip install ".[test]"

      - name: Run tests
        run: pytest -q
