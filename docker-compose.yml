# Aegis Docs — local run with hard resource caps.
#
# The aegis-server is light (~360 MB: FastAPI + BM25 + embeddings). The heavy part
# is the OPTIONAL LLM judge (Ollama 7b+), which is intentionally NOT run here — it
# holds ~5-6 GB RAM and should live on dedicated hardware, not a laptop.
#
#   docker compose up --build        # build (fetches docs) + run, capped
#   docker compose down
services:
  aegis-server:
    build:
      context: .
      args:
        STACK: "fastapi==0.115"      # docs baked at build time
    # Pulled from the registry on `docker compose pull` (multi-arch: macOS / Windows /
    # Linux). Replace OWNER; or keep the `build` block below to build locally instead.
    image: ghcr.io/OWNER/aegis-docs:latest
    ports:
      - "127.0.0.1:8080:8080"        # loopback only — never expose publicly
    # LLM judge OFF by default. To enable, point at the capped ollama service below:
    #   command: ["aegis","serve","--host","0.0.0.0","--port","8080","--vault","/vault",
    #             "--offline","--llm","true","--llm-host","http://ollama:11434",
    #             "--llm-model","qwen2.5:7b-instruct","--threads","2"]
    command: ["aegis","serve","--host","0.0.0.0","--port","8080","--vault","/vault","--offline","--llm","false"]
    mem_limit: 1g                    # hard RAM cap — cannot eat the machine
    memswap_limit: 1g                # no swap blow-up
    cpus: "1.0"                      # at most 1 CPU
    restart: unless-stopped
    # To use the judge: set AEGIS_JUDGE=1 and OLLAMA_HOST=http://ollama:11434 here,
    # then start with: docker compose --profile judge up

  # Optional LLM judge backend. Started ONLY with: docker compose --profile judge up
  # Capped so it cannot starve the host. A 7b model needs ~5-6 GB -> heavy by nature;
  # run it on a real box, not a laptop.
  ollama:
    image: ollama/ollama:latest
    profiles: ["judge"]
    environment:
      OLLAMA_KEEP_ALIVE: "0"          # unload model right after each request -> free RAM
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_NUM_PARALLEL: "1"
    mem_limit: 7g                      # hard RAM cap (7b ~5-6 GB + headroom)
    memswap_limit: 7g                  # no swap blow-up
    cpus: "2.0"                        # at most 2 cores
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped

volumes:
  ollama-models:
