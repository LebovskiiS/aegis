apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis
  labels: { app: aegis }
spec:
  replicas: 1
  selector:
    matchLabels: { app: aegis }
  template:
    metadata:
      labels: { app: aegis }
    spec:
      # Hardened pod: non-root, no privilege escalation, default seccomp.
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001            # makes the writable volumes group-owned by the app user
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: aegis
          image: lebovskiis/aegis:0.2.0   # pinned; the image bakes the docs + embedding model
          imagePullPolicy: IfNotPresent
          # Image CMD already runs: aegis serve --host 0.0.0.0 --port 8080 --vault /vault --offline
          ports:
            - { name: http, containerPort: 8080 }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true     # rootfs is read-only; only the mounts below are writable
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
          startupProbe:                       # model load can take ~10-20s on first start
            httpGet: { path: /health, port: http }
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 15
          volumeMounts:
            - { name: data, mountPath: /data }   # tamper-evident audit log (AEGIS_AUDIT_LOG=/data/audit.log)
            - { name: tmp,  mountPath: /tmp }     # scratch for the ONNX runtime
      volumes:
        - { name: data, emptyDir: {} }
        - { name: tmp,  emptyDir: {} }
